<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AlignMind Tasks</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a; 
      color: white; 
      margin: 0; 
      padding: 16px;
    }
   .card { 
      background: #1e293b; 
      border-radius: 12px; 
      padding: 20px; 
      margin-bottom: 16px; 
      border: 1px solid #334155;
    }
   .header { font-size: 14px; color: #94a3b8; margin-bottom: 8px; }
   .balance { font-size: 36px; font-weight: bold; color: #2563EB; margin: 8px 0; }
   .stats { color: #cbd5e1; font-size: 14px; }
   .btn { 
      background: #2563EB; 
      color: white; 
      border: none; 
      padding: 16px; 
      width: 100%; 
      border-radius: 8px; 
      font-size: 16px; 
      font-weight: 600;
      cursor: pointer;
    }
   .btn:disabled { background: #475569; cursor: not-allowed; }
   .btn-secondary { background: #475569; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header" id="username">Loading...</div>
    <div>Current Balance</div>
    <div class="balance">$<span id="balance">0.00</span></div>
    <div class="stats">Tasks Completed: <span id="tasks">0</span></div>
  </div>

  <div class="card">
    <button class="btn" id="taskBtn" onclick="startTask()">Start New Task</button>
    <button class="btn btn-secondary" onclick="withdraw()">Withdraw Earnings</button>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    let userData = {};

    // Load user data on startup
    fetch('/api/user', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ initData: tg.initData })
    })
   .then(r => r.json())
   .then(user => {
      userData = user;
      document.getElementById('username').innerText = `Hi, ${user.first_name || user.username || 'User'}`;
      document.getElementById('balance').innerText = user.balance;
      document.getElementById('tasks').innerText = user.tasks_completed;
    })
   .catch(err => {
      document.getElementById('username').innerText = 'Error loading data';
      console.error(err);
    });

    function startTask() {
      tg.showAlert('Task system coming in Step 5. Backend ready, UI next.');
    }

    function withdraw() {
      tg.showAlert('Withdrawals coming in Step 6. Minimum $10.00');
    }
  </script>
</body>
  </html>
